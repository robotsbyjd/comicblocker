<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1235 353" role="img" aria-labelledby="title desc">
  <title id="title">Comic Blocker Header Logo</title>
  <desc id="desc">Large Comic Blocker header logo with page icon and two-line tagline.</desc>
  <rect width="1235" height="353" fill="#0a0a0a"/>
  <g transform="translate(26 63)">
    <rect x="19" y="17" width="176" height="215" rx="15" fill="#c87a08" transform="rotate(-2 107 124)"/>
    <rect x="0" y="0" width="181" height="209" rx="15" fill="#f7f7f7" transform="rotate(-2 90.5 104.5)"/>
    <g transform="translate(30 30) rotate(-2 60 76)">
      <rect x="0" y="0" width="120" height="48" rx="4" fill="#0a0a0a"/>
      <rect x="2" y="62" width="51" height="88" rx="4" fill="#0a0a0a"/>
      <rect x="68" y="62" width="51" height="32" rx="4" fill="#0a0a0a"/>
      <rect x="70" y="110" width="51" height="40" rx="4" fill="#0a0a0a"/>
    </g>
  </g>
  <text x="300" y="134" fill="#f5f5f5" font-family="Arial, Helvetica, system-ui, sans-serif" font-size="86" font-weight="800" letter-spacing="0">Comic Blocker</text>
  <text x="300" y="222" fill="#a8a8a8" font-family="Consolas, Menlo, Monaco, ui-monospace, monospace" font-size="52" letter-spacing="2">Block your comic before you</text>
  <text x="300" y="288" fill="#a8a8a8" font-family="Consolas, Menlo, Monaco, ui-monospace, monospace" font-size="52" letter-spacing="2">draw it.</text>
</svg>
